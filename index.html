<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Kwarto</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/b6ae3ffc79.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="kwarto_logo.jpg" alt="The Kwarto Logo">
            <h1>The Kwarto</h1>
        </div>

        <nav>
            <a href="#hero">Home</a>
            <a href="#features">Features</a>
            <a href="#gallery">Gallery</a>
            <a href="#details">Details</a>
            <a href="#footer">Contact</a>
        </nav>
        
        <button id="menu-btn">☰</button>
    </header>

    <section id="hero">
        <div class="hero-content">
            <h2>Your Perfect Stay in Baguio</h2>
            <p>Modern, Cozy, Affordable</p>
            <button id="book-now">Book Now</button>
        </div>
    </section>

    <section id="features">
        <h2>Why Choose The Kwarto?</h2>
        <div class="features-grid">
            <div class="feature"> Cozy & Relaxing Space</div>
            <div class="feature"> City View Balcony</div>
            <div class="feature"> Fast Free Wifi</div>
            <div class="feature"> Fully Equipped Kitchen</div>
        </div>
    </section>

</body>
</html>
